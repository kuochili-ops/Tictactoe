<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gomoku Alert v48</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root { --black: #333; --white: #fff; --board-bg: #e3c193; --line-green: #06c755; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; margin: 0; background: #f0f0f0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        #selector-overlay { position: fixed; inset: 0; background: white; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        .header { height: 50px; padding: 0 15px; background: white; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .game-main { flex: 1; width: 100%; overflow: auto; display: flex; align-items: center; justify-content: center; background: #bbb; position: relative; }
        .board-container { position: relative; padding: 6px; background: var(--board-bg); border: 3px solid #b58d59; border-radius: 4px; }
        .board { display: grid; grid-template-columns: repeat(15, 1fr); background: var(--board-bg); }
        .cell { width: 6.5vw; height: 6.5vw; max-width: 35px; max-height: 35px; border: 0.5px solid #00000015; display: flex; align-items: center; justify-content: center; position: relative; }
        .stone { width: 90%; height: 90%; border-radius: 50%; transform: scale(0); transition: 0.1s; z-index: 5; }
        .stone.black { background: var(--black); transform: scale(1); }
        .stone.white { background: var(--white); transform: scale(1); }
        .last-move::after { content: ''; width: 8px; height: 8px; background: #ff4757; border-radius: 50%; position: absolute; z-index: 10; }

        #chat-overlay { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 80%; pointer-events: none; z-index: 50; display: flex; flex-direction: column; gap: 4px; }
        .chat-msg { background: rgba(255, 255, 255, 0.7); border-radius: 8px; padding: 3px 10px; font-size: 11px; width: fit-content; font-weight: bold; }
        .sys-msg { background: rgba(6, 199, 85, 0.8); color: white; }

        .bottom-panel { width: 100%; background: white; border-top: 1px solid #ccc; padding-bottom: env(safe-area-inset-bottom); }
        .panel-content { padding: 10px 15px; display: flex; flex-direction: column; gap: 8px; }
        button { padding: 10px; border-radius: 20px; border: none; font-size: 14px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="selector-overlay">
        <h2 style="color:var(--line-green)">五子棋對弈</h2>
        <p>點擊下方按鈕，挑選好友發送挑戰狀：</p>
        <button onclick="Game.sendInvite()" style="background:var(--line-green); color:white; width:100%; height:60px; font-size:18px">⚔️ 發送挑戰邀請</button>
        <p style="font-size: 12px; color: #999; margin-top: 10px;">對方進入後，您將會收到通知</p>
    </div>

    <div class="header">
        <div id="room-info" style="font-size:11px; color:#666">連線中...</div>
        <div id="game-turn" style="font-weight:bold; color:var(--line-green)">等待中</div>
    </div>

    <div class="game-main">
        <div class="board-container">
            <div class="board" id="board"></div>
            <div id="chat-overlay"></div>
        </div>
    </div>

    <div class="bottom-panel">
        <div class="panel-content">
            <div style="display: flex; gap: 10px;">
                <button onclick="Game.sendInvite()" style="background:var(--line-green); color:white; flex:1">再催一次</button>
                <button onclick="Game.reset()" style="background:#ff4757; color:white; flex:1">重設棋盤</button>
                <button onclick="liff.closeWindow()" style="background:#eee; color:#666; flex:1">離開</button>
            </div>
        </div>
    </div>

    <script>
        const LIFF_ID = "2009222789-QB82euV3";
        const firebaseConfig = {
            apiKey: "AIzaSyAL9O0RLLY-Ce4GdwFPCAr9lglm-EhWFjs",
            authDomain: "tictactoe-305fa.firebaseapp.com",
            databaseURL: "https://tictactoe-305fa-default-rtdb.firebaseio.com",
            projectId: "tictactoe-305fa",
            appId: "1:130400281186:web:70e5a8e91011808585a73b"
        };

        const Game = {
            db: null, myUID: null, myName: "玩家", currentRoomID: null, 
            hasNotifiedEntry: false, // 防止重複彈窗

            async init() {
                const b = document.getElementById('board');
                for(let i=0; i<225; i++) {
                    let c = document.createElement('div');
                    c.className = 'cell';
                    c.onclick = () => this.play(i);
                    c.innerHTML = '<div class="stone"></div>';
                    b.appendChild(c);
                }
                
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const prof = await liff.getProfile();
                this.myUID = prof.userId;
                this.myName = prof.displayName;

                const ctx = liff.getContext();
                this.currentRoomID = ctx.groupId || ctx.roomId || ctx.utouId || "P_" + this.myUID;
                
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                this.connectFirebase();
            },

            async sendInvite() {
                try {
                    await liff.shareTargetPicker([{
                        type: "flex",
                        altText: this.myName + " 邀請你五子棋對決！",
                        contents: {
                            "type": "bubble",
                            "body": {
                                "type": "box", "layout": "vertical",
                                "contents": [
                                    {"type": "text", "text": "⚔️ 五子棋挑戰狀", "weight": "bold", "size": "xl", "color": "#06c755"},
                                    {"type": "text", "text": "對手已就位，點擊下方進入棋室！", "margin": "md", "size": "sm"}
                                ]
                            },
                            "footer": {
                                "type": "box", "layout": "vertical",
                                "contents": [{
                                    "type": "button",
                                    "action": {"type": "uri", "label": "進入棋室", "uri": "https://liff.line.me/" + LIFF_ID},
                                    "style": "primary", "color": "#06c755"
                                }]
                            }
                        }
                    }]);
                    document.getElementById('selector-overlay').style.display = 'none';
                } catch (e) { console.log("Invite Cancelled"); }
            },

            connectFirebase() {
                this.db = firebase.database().ref('v48/' + this.currentRoomID);
                document.getElementById('room-info').innerText = "房號: " + this.currentRoomID.substring(0, 8);
                
                this.db.on('value', snap => {
                    const oldData = this.data;
                    this.data = snap.val();

                    if (!this.data) {
                        this.db.set({ board: Array(225).fill(""), turn: "Black", pB: this.myUID, pBName: this.myName, lastIdx: -1 });
                    } else {
                        // 【關鍵邏輯】偵測白方進入
                        if (this.myUID === this.data.pB && !this.hasNotifiedEntry && this.data.pW && this.data.pW !== this.myUID) {
                            this.hasNotifiedEntry = true;
                            this.showSystemMsg(`🎉 對手 ${this.data.pWName} 已進入棋室！`);
                            if (window.TapticEngine) TapticEngine.notification({type: 'success'}); // 震動回饋(若支援)
                            alert(`對手 ${this.data.pWName} 已進入，請開始下子！`);
                        }
                        this.render();
                    }
                });
            },

            showSystemMsg(text) {
                const overlay = document.getElementById('chat-overlay');
                const div = document.createElement('div');
                div.className = 'chat-msg sys-msg';
                div.innerText = text;
                overlay.appendChild(div);
                setTimeout(() => div.remove(), 5000); // 5秒後自動移除
            },

            render() {
                const cells = document.querySelectorAll('.cell');
                this.data.board.forEach((v, i) => {
                    cells[i].querySelector('.stone').className = 'stone' + (v ? ' ' + v.toLowerCase() : '');
                    cells[i].classList.toggle('last-move', i === this.data.lastIdx);
                });
                document.getElementById('game-turn').innerText = this.data.winner ? (this.data.winner + "勝!") : (this.data.turn === 'Black' ? "黑子回合" : "白子回合");
            },

            play(i) {
                if (!this.data || this.data.winner || this.data.board[i]) return;
                let role = (this.myUID === this.data.pB) ? "Black" : "White";
                if (!this.data.pW && this.myUID !== this.data.pB) {
                    this.db.update({ pW: this.myUID, pWName: this.myName });
                    role = "White";
                }
                if (role !== this.data.turn) return;
                const b = [...this.data.board]; b[i] = role;
                this.db.update({ board: b, turn: role === "Black" ? "White" : "Black", lastIdx: i });
            },

            reset() {
                if (confirm("清空棋盤？")) {
                    this.hasNotifiedEntry = false; // 重設通知狀態
                    this.db.set({ board: Array(225).fill(""), turn: "Black", pB: this.myUID, pBName: this.myName, lastIdx: -1 });
                }
            }
        };

        Game.init();
    </script>
</body>
</html>
